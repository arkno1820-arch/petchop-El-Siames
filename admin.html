<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel — Administrar productos</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F2E7; --paper:#FFFDF8; --ink:#20291F; --moss:#39543F;
    --gold:#C8932E; --line:#DCD2B8; --danger:#B4442E;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Work Sans',sans-serif;padding:20px;}
  h1{font-family:'Fraunces',serif;font-size:22px;margin:0 0 4px;}
  .sub{color:var(--moss);font-size:13px;margin-bottom:24px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:520px;margin:0 auto 20px;}

  label{display:block;font-size:12.5px;font-weight:600;margin:12px 0 5px;}
  input,select,textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font-family:'Work Sans',sans-serif;font-size:14px;background:#fff;
  }
  textarea{resize:vertical;min-height:60px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  button.primary{
    margin-top:18px;width:100%;background:var(--ink);color:#fff;border:none;
    border-radius:8px;padding:12px;font-size:14.5px;font-weight:600;cursor:pointer;
  }
  button.primary:disabled{opacity:.5;}

  .preview{width:80px;height:80px;border-radius:10px;object-fit:cover;background:#EEE7D6;}

  .lista{max-width:520px;margin:0 auto;}
  .prod-row{
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    display:flex;gap:12px;align-items:center;padding:10px;margin-bottom:10px;
  }
  .prod-row img{width:50px;height:50px;border-radius:8px;object-fit:cover;background:#EEE7D6;}
  .prod-info{flex:1;}
  .prod-name{font-weight:600;font-size:14px;}
  .prod-meta{font-size:12px;color:var(--moss);}
  .prod-actions button{
    border:none;background:none;cursor:pointer;font-size:16px;padding:4px 6px;
  }

  .pin-screen{max-width:320px;margin:80px auto;text-align:center;}
  .msg{font-size:13px;text-align:center;margin-top:10px;min-height:16px;}
  .msg.ok{color:var(--moss);} .msg.err{color:var(--danger);}

  .link-btn{
    background:none;border:none;color:var(--danger);font-size:11px;
    text-decoration:underline;cursor:pointer;margin-left:8px;padding:0;
  }
  .stat-label{font-size:12.5px;font-weight:600;margin:14px 0 2px;}
  .chart-wrap{
    display:flex;align-items:flex-end;gap:3px;height:110px;
    overflow-x:auto;padding-top:10px;border-bottom:1px solid var(--line);
  }
  .chart-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    min-width:16px;flex:1;height:100%;}
  .chart-bar{width:100%;max-width:20px;background:var(--moss);border-radius:3px 3px 0 0;min-height:2px;}
  .chart-label{font-size:8.5px;color:var(--moss);margin-top:4px;white-space:nowrap;}
</style>
</head>
<body>

<div id="pinScreen" class="pin-screen">
  <h1>Panel del vendedor</h1>
  <p class="sub">Ingresá tu PIN para administrar los productos</p>
  <input type="password" id="pinInput" inputmode="numeric" placeholder="PIN" style="text-align:center;font-size:20px;letter-spacing:4px;">
  <button class="primary" onclick="entrar()">Entrar</button>
  <div class="msg err" id="pinMsg"></div>
</div>

<div id="panel" style="display:none;">
  <h1>Tus productos</h1>
  <p class="sub">Agregá, editá o sacá de la venta cualquier producto.</p>

  <div class="card">
    <h3 id="formTitle" style="margin:0;font-family:'Work Sans',sans-serif;font-size:14px;">Nuevo producto</h3>
    <label>Fotos (podés elegir varias)</label>
    <input type="file" id="imgInput" accept="image/*" multiple onchange="previsualizar()">
    <div id="previewRow" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div>

    <label>Nombre</label>
    <input id="nombre" placeholder="Ej: Mate imbuia">

    <div class="row2">
      <div><label>Precio</label><input id="precio" type="number" placeholder="15990"></div>
      <div><label>Stock</label><input id="stock" type="number" placeholder="10"></div>
    </div>

    <label>Categoría</label>
    <input id="categoria" placeholder="Ej: Mates" list="catList">
    <datalist id="catList"></datalist>

    <label>Descripción</label>
    <textarea id="descripcion" placeholder="Detalle breve del producto"></textarea>

    <button class="primary" id="guardarBtn" onclick="guardar()">Guardar producto</button>
    <button class="primary" id="cancelarBtn" style="display:none;background:var(--line);color:var(--ink);" onclick="resetForm()">Cancelar edición</button>
    <div class="msg" id="formMsg"></div>
  </div>

  <div class="lista" id="lista"></div>

  <div class="card" style="margin-top:30px;">
    <h3 style="margin:0 0 4px;font-family:'Work Sans',sans-serif;font-size:14px;">Estadísticas</h3>

    <p class="sub" style="margin-bottom:4px;">
      Visitas totales: <strong id="totalVisitas">—</strong>
      <button class="link-btn" onclick="resetear('resetVisitas')">Reiniciar</button>
    </p>

    <p class="stat-label">Visitas por hora del día</p>
    <div class="chart-wrap" id="chartHora"></div>

    <p class="stat-label">Visitas por día (últimos 14)</p>
    <div class="chart-wrap" id="chartDia"></div>

    <p class="stat-label" style="margin-top:20px;">
      Carritos sin completar
      <button class="link-btn" onclick="resetear('resetCarritos')">Reiniciar</button>
    </p>
    <div id="carritosAbandonados"></div>
  </div>
</div>

<script>
/* ====== CONFIGURACIÓN ====== */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz2EB0ywgt5RmAYDLFBt0WTzE5rC_-kiCNEQKANIjdQmFA24CPP5NySNLkLWv1sm2GO/exec';

let PIN = sessionStorage.getItem('adminPin') || '';
let productos = [];
let editandoId = null;
let archivosSeleccionados = []; // {nombre, tipo, base64}

if(PIN) entrarConPin();

function entrar(){
  PIN = document.getElementById('pinInput').value.trim();
  if(!PIN){ return; }
  entrarConPin();
}

async function entrarConPin(){
  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?action=productos&pin=${encodeURIComponent(PIN)}`);
    const data = await res.json();
    if(!data.ok && data.error){ throw new Error(data.error); }
    sessionStorage.setItem('adminPin', PIN);
    productos = data.productos || [];
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    renderLista();
    cargarStats();
  }catch(err){
    document.getElementById('pinMsg').textContent = 'No se pudo conectar. Revisá el PIN o la URL configurada.';
  }
}

async function cargarStats(){
  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?action=stats&pin=${encodeURIComponent(PIN)}`);
    const data = await res.json();
    if(!data.ok) return;
    document.getElementById('totalVisitas').textContent = data.totalVisitas;

    renderChart('chartHora', data.visitasPorHora, data.visitasPorHora.map((_,h)=>h));
    renderChart('chartDia', data.visitasPorDia.map(d=>d.count), data.visitasPorDia.map(d=>d.fecha));

    const cont = document.getElementById('carritosAbandonados');
    if(!data.carritosAbandonados.length){
      cont.innerHTML = '<p class="sub">Por ahora no hay carritos sin completar 🎉</p>';
      return;
    }
    cont.innerHTML = data.carritosAbandonados.map(c => `
      <div class="prod-row" style="align-items:flex-start;">
        <div class="prod-info">
          <div class="prod-meta">${new Date(c.fecha).toLocaleString('es-CL')}</div>
          <div class="prod-name" style="font-size:13px;">${c.items.map(i=>`${i.nombre} x${i.cantidad}`).join(', ')}</div>
          <div class="prod-meta">Total: $${Number(c.total).toLocaleString('es-CL')}</div>
        </div>
      </div>
    `).join('');
  }catch(err){}
}

function renderChart(containerId, valores, etiquetas){
  const el = document.getElementById(containerId);
  if(!valores.length){ el.innerHTML = '<p class="sub">Todavía no hay datos.</p>'; return; }
  const max = Math.max(...valores, 1);
  el.innerHTML = valores.map((v,i) => `
    <div class="chart-col" title="${v} visita(s)">
      <div class="chart-bar" style="height:${Math.max((v/max*90),2)}px;"></div>
      <div class="chart-label">${etiquetas[i]}</div>
    </div>
  `).join('');
}

async function resetear(action){
  const texto = action==='resetVisitas'
    ? '¿Reiniciar el contador de visitas? Se borra todo el historial.'
    : '¿Reiniciar los carritos sin completar? Se borra todo el historial.';
  if(!confirm(texto)) return;
  const resp = await llamarBackend({action});
  if(resp.ok) cargarStats();
}

function previsualizar(){
  const files = Array.from(document.getElementById('imgInput').files);
  if(!files.length) return;
  archivosSeleccionados = [];
  const row = document.getElementById('previewRow');
  row.innerHTML = '';
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      archivosSeleccionados.push({nombre:file.name, tipo:file.type, base64:reader.result.split(',')[1]});
      const img = document.createElement('img');
      img.className = 'preview';
      img.src = reader.result;
      row.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

async function llamarBackend(body){
  const res = await fetch(APPS_SCRIPT_URL, {
    method:'POST',
    body: JSON.stringify({...body, pin: PIN})
  });
  return res.json();
}

async function guardar(){
  const nombre = document.getElementById('nombre').value.trim();
  const precio = Number(document.getElementById('precio').value);
  if(!nombre || !precio){
    document.getElementById('formMsg').textContent = 'Completá al menos nombre y precio.';
    document.getElementById('formMsg').className = 'msg err';
    return;
  }
  const btn = document.getElementById('guardarBtn');
  btn.disabled = true; btn.textContent = 'Guardando...';

  try{
    let imagenUrl = editandoId ? (productos.find(p=>p.id===editandoId)||{}).imagenUrl : '';
    if(archivosSeleccionados.length){
      const urls = [];
      for(const a of archivosSeleccionados){
        const up = await llamarBackend({action:'uploadImage', filename:a.nombre, mimeType:a.tipo, base64:a.base64});
        if(!up.ok) throw new Error(up.error);
        urls.push(up.url);
      }
      imagenUrl = urls.join(',');
    }

    const producto = {
      id: editandoId,
      nombre, precio,
      categoria: document.getElementById('categoria').value.trim(),
      descripcion: document.getElementById('descripcion').value.trim(),
      stock: Number(document.getElementById('stock').value) || 0,
      imagenUrl, activo: true
    };

    const resp = await llamarBackend({action: editandoId ? 'updateProduct':'addProduct', producto});
    if(!resp.ok) throw new Error(resp.error);

    if(editandoId){
      const i = productos.findIndex(p=>p.id===editandoId);
      productos[i] = resp.producto;
    } else {
      productos.push(resp.producto);
    }
    resetForm();
    renderLista();
    document.getElementById('formMsg').textContent = 'Guardado ✓';
    document.getElementById('formMsg').className = 'msg ok';
  }catch(err){
    document.getElementById('formMsg').textContent = 'Error: ' + err.message;
    document.getElementById('formMsg').className = 'msg err';
  }finally{
    btn.disabled = false; btn.textContent = 'Guardar producto';
  }
}

function editar(id){
  const p = productos.find(x=>x.id===id);
  editandoId = id;
  document.getElementById('formTitle').textContent = 'Editando: ' + p.nombre;
  document.getElementById('nombre').value = p.nombre;
  document.getElementById('precio').value = p.precio;
  document.getElementById('stock').value = p.stock;
  document.getElementById('categoria').value = p.categoria;
  document.getElementById('descripcion').value = p.descripcion || '';
  const row = document.getElementById('previewRow');
  row.innerHTML = '';
  (p.imagenUrl||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(url=>{
    const img = document.createElement('img');
    img.className = 'preview'; img.src = url;
    row.appendChild(img);
  });
  archivosSeleccionados = [];
  document.getElementById('cancelarBtn').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetForm(){
  editandoId = null; archivosSeleccionados = [];
  document.getElementById('formTitle').textContent = 'Nuevo producto';
  ['nombre','precio','stock','categoria','descripcion'].forEach(id => document.getElementById(id).value='');
  document.getElementById('imgInput').value = '';
  document.getElementById('previewRow').innerHTML = '';
  document.getElementById('cancelarBtn').style.display = 'none';
}

async function eliminar(id){
  if(!confirm('¿Sacar este producto de la venta?')) return;
  const resp = await llamarBackend({action:'deleteProduct', id});
  if(resp.ok){
    productos = productos.filter(p=>p.id!==id);
    renderLista();
  }
}

function actualizarCategorias(){
  const cats = [...new Set(productos.map(p => p.categoria).filter(Boolean))];
  document.getElementById('catList').innerHTML = cats.map(c => `<option value="${c}">`).join('');
}

function renderLista(){
  actualizarCategorias();
  document.getElementById('lista').innerHTML = productos.map(p => `
    <div class="prod-row">
      <img src="${(p.imagenUrl||'').split(',')[0].trim() || 'https://placehold.co/100/EEE7D6/999?text=•'}">
      <div class="prod-info">
        <div class="prod-name">${p.nombre}</div>
        <div class="prod-meta">${p.categoria||''} · $${Number(p.precio).toLocaleString('es-CL')} · stock ${p.stock}</div>
      </div>
      <div class="prod-actions">
        <button onclick="editar('${p.id}')" title="Editar">✏️</button>
        <button onclick="eliminar('${p.id}')" title="Eliminar">🗑️</button>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
